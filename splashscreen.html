<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/x-icon" href="/src/assets/favicon.ico" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>nullstrap</title>
        <link rel="stylesheet" href="/src/splash.css" />
    </head>
    <body>
        <div class="titlebar" data-tauri-drag-region>
            <div id="title-header" class="title-header"></div>
            <div class="controls">
                <button id="minimize" title="minimize">
                    <!-- https://api.iconify.design/mdi:window-minimize.svg -->
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="24"
                        height="24"
                        viewBox="0 0 24 24"
                    >
                        <path fill="currentColor" d="M19 13H5v-2h14z" />
                    </svg>
                </button>
                <button id="close" title="close">
                    <!-- https://api.iconify.design/mdi:close.svg -->
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="24"
                        height="24"
                        viewBox="0 0 24 24"
                    >
                        <path
                            fill="currentColor"
                            d="M13.46 12L19 17.54V19h-1.46L12 13.46L6.46 19H5v-1.46L10.54 12L5 6.46V5h1.46L12 10.54L17.54 5H19v1.46z"
                        />
                    </svg>
                </button>
            </div>
        </div>

        <div class="container">
            <div class="right-pane">
                <!-- Launch Button -->
                <div class="action-card launch-card" id="launch-btn">
                    <div class="card-content">
                        <svg
                            class="card-icon"
                            viewBox="0 0 24 24"
                            fill="currentColor"
                        >
                            <path

                            />
                        </svg>
                        <span class="card-title">Launch Roblox</span>
                    </div>
                </div>

                <div class="action-card" id="settings-btn">
                    <div class="card-content">
                        <svg
                            class="card-icon"
                            viewBox="0 0 24 24"
                            fill="currentColor"
                        >
                            <path
                                d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.488.488 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"
                            />
                        </svg>
                        <span class="card-title">Settings</span>
                    </div>
                </div>

                <div class="action-card" id="studio-btn">
                    <div class="card-content">
                        <svg
                            class="card-icon"
                            viewBox="0 0 24 24"
                            fill="currentColor"
                        >
                            <path
                                d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"
                            />
                        </svg>
                        <span class="card-title">Studio</span>
                    </div>
                </div>
                <div>
                    <a class="link" id="github-link" href="https://github.com/Proton-Interactive/nullstrap">
                        <!-- https://api.iconify.design/mdi:information-outline.svg -->
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            width="16"
                            height="16"
                            viewBox="0 0 24 24"
                            style="margin-top: 4px; margin-right: 4px;"
                        >
                            <path fill="currentColor" d="M11 9h2V7h-2m1 13c-4.41 0-8-3.59-8-8s3.59-8 8-8s8 3.59 8 8s-3.59 8-8 8m0-18A10 10 0 0 0 2 12a10 10 0 0 0 10 10a10 10 0 0 0 10-10A10 10 0 0 0 12 2m-1 15h2v-6h-2z" />
                        </svg>
                        Our GitHub</a>
                    <a class="link" id="discord-link" href="https://discord.gg/DcfpgRuxCk">
                        <!-- https://api.iconify.design/mdi:bubble-outline.svg -->
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            width="16"
                            height="16"
                            viewBox="0 0 24 24"
                            style="margin-top: 4px; margin-right: 4px;"
                        >
                            <path fill="currentColor" d="M12 3C6.5 3 2 6.58 2 11a7.22 7.22 0 0 0 2.75 5.5c0 .6-.42 2.17-2.75 4.5c2.37-.11 4.64-1 6.47-2.5c1.14.33 2.34.5 3.53.5c5.5 0 10-3.58 10-8s-4.5-8-10-8m0 14c-4.42 0-8-2.69-8-6s3.58-6 8-6s8 2.69 8 6s-3.58 6-8 6" />
                        </svg>
                        Discord Server</a>
                </div>
            </div>
        </div>

        <script type="module" src="/src/splashscreen.ts"></script>
    </body>
</html>
